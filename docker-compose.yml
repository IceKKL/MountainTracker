services:
  mountain-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mountain-tracker
    ports:
      - "8082:8082"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-zmien-to-w-produkcji}
    volumes:
      # SQLite (db.sqlite + pliki WAL/SHM) — dane przetrwają restart kontenera
      - ./server/data:/app/server/data
      # Zdjęcia, GPX, FIT — pliki wgrywane przez użytkownika
      - ./server/uploads:/app/server/uploads
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
